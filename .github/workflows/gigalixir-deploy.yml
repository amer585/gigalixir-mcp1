name: Deploy to Gigalixir

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Deploy to Gigalixir
        env:
          GIGALIXIR_EMAIL: amerameryou1@gmail.com
          GIGALIXIR_API_KEY: ${{ secrets.GIGALIXIR_API_KEY }}
          GIGALIXIR_APP: amer
        run: |
          # If GIGALIXIR_API_KEY is not set in secrets, we'll gracefully fallback/warn so the workflow doesn't completely crash for users testing without it initially, though it will fail the git push.
          if [ -z "$GIGALIXIR_API_KEY" ]; then
            echo "Warning: GIGALIXIR_API_KEY is not set in GitHub repository secrets."
            echo "Skipping actual push to gigalixir git remote but completing workflow."
            exit 0
          fi
          git remote add gigalixir https://$GIGALIXIR_EMAIL:$GIGALIXIR_API_KEY@git.gigalixir.com/$GIGALIXIR_APP.git
          git push -f gigalixir main
